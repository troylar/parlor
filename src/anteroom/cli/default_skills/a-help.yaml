  ### Built-in Tools

  | Tool            | Tier       | Description                                           |
  |-----------------|------------|-------------------------------------------------------|
  | read_file       | READ       | Read file contents with line numbers                  |
  | glob_files      | READ       | Find files by glob pattern (e.g. '**/*.py')           |
  | grep            | READ       | Regex search across file contents                     |
  | write_file      | WRITE      | Create or overwrite a file                            |
  | edit_file       | WRITE      | Exact string replacement in files                     |
  | bash            | EXECUTE    | Run shell commands (git, build, tests)                |
  | create_canvas   | READ       | Create a rich content panel alongside chat            |
  | update_canvas   | READ       | Replace canvas content entirely                       |
  | patch_canvas    | READ       | Incremental search/replace on canvas                  |
  | run_agent       | EXECUTE    | Spawn a sub-agent for parallel/isolated tasks         |
  | ask_user        | READ       | Ask the user a question and wait for response         |
  | introspect      | READ       | Let AI examine its own runtime context                |

  MCP tools default to EXECUTE tier. Override tiers via `safety.tool_tiers` config.

  ### Tool Risk Tiers & Approval Modes

  | Tier        | Level | Examples                              |
  |-------------|-------|---------------------------------------|
  | READ        | 0     | read_file, glob_files, grep, canvas   |
  | WRITE       | 1     | write_file, edit_file                 |
  | EXECUTE     | 2     | bash, run_agent, MCP tools            |
  | DESTRUCTIVE | 3     | rm -rf, git reset --hard              |

  | Approval Mode     | READ | WRITE | EXECUTE | DESTRUCTIVE |
  |-------------------|------|-------|---------|-------------|
  | auto              | skip | skip  | skip    | skip        |
  | ask_for_dangerous | skip | skip  | skip    | ask         |
  | ask_for_writes    | skip | ask   | ask     | ask         |
  | ask               | skip | ask   | ask     | ask         |

  Permission scopes: Allow Once, Allow for Session, Allow Always (persists to config.yaml).
  `--read-only` flag restricts to READ-tier tools only.

  ### Skill YAML Format

  Skills are YAML files with three fields:
  ```yaml
  name: skill-name          # used as /skill-name
  description: One liner    # shown in /skills list
  prompt: |                 # the prompt template
    Instructions for the AI. Use {args} for user arguments.
  ```
  Directories (highest priority first):
  1. `.anteroom/skills/` or `.claude/skills/` (project-level, walk-up discovery)
  2. `~/.anteroom/skills/` or `~/.claude/skills/` (user-level)
  3. Built-in default skills (commit, review, explain, create-eval, a-help)

  ### Project Instructions (ANTEROOM.md)

  Project-level instructions loaded automatically via walk-up discovery from cwd.

  **Search filenames** (first match wins at each directory level):
  `.anteroom.md` > `ANTEROOM.md` > `.claude.md` > `CLAUDE.md`

  **Discovery**: walks up from cwd to filesystem root. Also loads global from `~/.anteroom/`.
  **Trust**: SHA-256 hash verified before loading. Interactive mode prompts to trust/reject.
  CLI flags: `--trust-project` (auto-trust), `--no-project-context` (skip entirely).

