  | /projects      | List all projects (shortcut for /project list)   |
  | /mcp           | Show MCP server status and tools                 |
  | /conventions   | Display project conventions (ANTEROOM.md)        |
  | /plan          | Enter/exit planning mode                         |
  | /artifact-check| Run artifact health check (built-in skill)      |
  | /verbose       | Toggle verbosity level                           |
  | /detail        | Toggle tool call detail display                  |
  | /clear         | Clear screen                                     |
  | /quit          | Exit the REPL                                    |

