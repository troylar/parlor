  ## Artifact Model & Packs

  ### 7 Artifact Types
  | Type | Purpose |
  |------|---------|
  | skill | Reusable prompt template (`/skill-name`) |
  | rule | Always-on instruction injected every turn |
  | instruction | Static system prompt context |
  | context | Dynamic per-turn reference material |
  | memory | Persistent cross-session knowledge |
  | mcp_server | MCP server connection config |
  | config_overlay | YAML config fragment merged at runtime |

  ### FQN Format
  `@namespace/type/name` — e.g., `@acme/skill/commit`
  Regex: `^@[a-z0-9_-]+/[a-z_]+/[a-z0-9_][a-z0-9_.-]*$`

  ### 6-Layer Precedence (highest → lowest)
  inline (5) > local (4) > project (3) > team (2) > global (1) > built_in (0)

  ### Pack Commands
  - `aroom pack list` — list installed packs
  - `aroom pack install PATH [--project]` — install from directory
  - `aroom pack show NAMESPACE/NAME` — show pack details
  - `aroom pack remove NAMESPACE/NAME` — remove pack
  - `aroom pack update PATH [--project]` — update existing pack
  - `aroom pack sources` — list configured pack sources
  - `aroom pack refresh` — manually refresh all sources

  ### Artifact Commands
  - `aroom artifact list [--type TYPE] [--namespace NS] [--source SOURCE]` — list artifacts
  - `aroom artifact show FQN` — show artifact details + version history
  - `aroom artifact check [--json] [--fix] [--project]` — health checks

  ### Config: pack_sources
  ```yaml
  pack_sources:
    - url: https://github.com/org/packs.git
      branch: main           # default: main
      refresh_interval: 30   # minutes; 0 = manual only; min: 5
  ```

  ### Health Check Categories
  config_conflict (ERROR), skill_collision (WARN), shadow (INFO),
  empty_artifact (WARN), malformed (ERROR), lock_drift (ERROR/WARN),
  bloat (INFO), orphaned (WARN), duplicate_content (WARN, fixable)

