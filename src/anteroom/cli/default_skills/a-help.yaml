  #### Compliance Rules (compliance section)

  Declarative config validation rules. Each rule checks a config field:
  ```yaml
  compliance:
    rules:
      - field: safety.approval_mode
        must_be: ask_for_writes
        message: "Approval mode must be ask_for_writes per policy"
      - field: ai.api_key
        must_not_be_empty: true
        message: "API key is required"
  ```
  Rule operators: `must_be`, `must_not_be`, `must_match` (regex), `must_not_be_empty`, `must_contain`.
  Validate with: `aroom config validate`

  #### Pack Sources (pack_sources top-level list)

  Git-based pack source repositories. Each entry:
  ```yaml
  pack_sources:
    - url: https://github.com/org/packs.git
      branch: main          # default: main
      refresh_interval: 30  # minutes; 0 = manual only
  ```
  Anteroom auto-clones into `~/.anteroom/cache/sources/`. URL scheme allowlist: https, http, git, ssh, git@host:path.

  #### Identity (identity section)

  | Field        | Type | Default      | Env Override         |
  |--------------|------|-------------|----------------------|
  | user_id      | str  | (auto UUID4) | AI_CHAT_USER_ID      |
  | display_name | str  | —            | AI_CHAT_DISPLAY_NAME |

  Ed25519 keypair auto-generated on first run. Used for message attribution in shared databases.

